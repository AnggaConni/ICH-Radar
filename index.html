              700: '#1f1f1f',

  <style>
    body { background-color: #0a0a0a; color: #f5f5f5; }

    /* ── Animated dashed heritage connection lines ── */
    .glowing-line {
      stroke: #00ffcc;
      filter: drop-shadow(0 0 3px #00ffcc) drop-shadow(0 0 8px #00ffcc);
      stroke-dasharray: 8 8;
      animation: dashMove 2s linear infinite;
    }
    @keyframes dashMove { to { stroke-dashoffset: -16; } }

    /* ── Pulsing main marker ── */
    @keyframes markerPulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,255,204,0.7); }
      70%  { box-shadow: 0 0 0 10px rgba(0,255,204,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,255,204,0); }
    }
    .marker-main {
      width:14px; height:14px;
      background:#00ffcc;
      border-radius:50%;
      border:2px solid #fff;
      animation: markerPulse 2s infinite;
    }
    .marker-related {
      width:10px; height:10px;
      background:#facc15;
      border-radius:50%;
      border:2px solid #fff;
      opacity:0.85;
    }

    /* ── Leaflet popup dark theme ── */
    .leaflet-popup-content-wrapper {
      background:#1f1f1f !important;
      color:#f5f5f5 !important;
      border:1px solid #333 !important;
      border-radius:10px !important;
      box-shadow:0 4px 20px rgba(0,0,0,0.6) !important;
    }
    .leaflet-popup-tip { background:#1f1f1f !important; }
    .leaflet-popup-content { margin:10px 14px !important; font-size:13px; line-height:1.5; }

    .modal-blur { backdrop-filter: blur(8px); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #141414; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-brand-700 bg-brand-900/80 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <i class="ph-fill ph-globe-hemisphere-east text-3xl text-brand-accent animate-pulse"></i>
        <h1 class="font-display font-bold text-xl tracking-tight" id="app-title">ICH <span class="text-brand-accent">Shared Heritage</span> Radar</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-xs text-gray-400 font-mono flex items-center gap-1" id="last-updated">
          <i class="ph ph-clock"></i> <span data-i18n="loading">Loading data...</span>
        </div>
        <button onclick="toggleLang()" class="bg-brand-800 border border-brand-700 hover:border-brand-500 px-3 py-1.5 rounded-md text-xs font-bold transition-colors flex items-center gap-2">
          <i class="ph ph-translate text-brand-secondary"></i>
          <span id="lang-label">EN</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col gap-8">

    <!-- Status Ticker -->
    <div class="bg-brand-900 border border-brand-700 rounded-lg p-3 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 text-xs font-mono text-gray-400 shadow-inner">
      <div class="flex items-center gap-2 text-brand-accent whitespace-nowrap">
        <span class="w-2 h-2 rounded-full bg-brand-accent animate-pulse"></span>
        <span data-i18n="sysStatus">System Status</span>: ONLINE
      </div>
      <div class="hidden sm:block border-l border-brand-700 h-4"></div>
      <div class="truncate flex-grow flex items-center gap-2">
        <span class="text-brand-secondary font-bold" data-i18n="sysLastAction">Latest Discovery:</span>
        <span id="system-ticker" class="text-gray-300 italic"><span data-i18n="sysStandby">Monitoring global sources...</span></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="stats-container"></div>

    <!-- Map -->
    <div class="flex flex-col gap-2">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i class="ph ph-map-trifold text-xl text-brand-secondary"></i>
          <h2 class="font-display font-bold text-lg" data-i18n="mapTitle">Heritage Network Map</h2>
        </div>
        <!-- Map Legend -->
        <div class="flex items-center gap-4 text-xs text-gray-400">
          <span class="flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 rounded-full bg-[#00ffcc]"></span> ICH Element
          </span>
          <span class="flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 rounded-full bg-[#facc15]"></span> Related Heritage
          </span>
          <span class="flex items-center gap-1.5">
            <svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#00ffcc" stroke-width="2" stroke-dasharray="4 3"/></svg>
            Connection
          </span>
        </div>
      </div>
      <div id="map" class="w-full h-[460px] rounded-xl border border-brand-700 bg-brand-800 z-10"></div>
    </div>

    <!-- Directory -->
    <div class="flex flex-col gap-4">
      <div class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4">
        <div class="flex items-center gap-2 shrink-0">
          <i class="ph ph-books text-xl text-brand-secondary"></i>
          <h2 class="font-display font-bold text-lg" data-i18n="directoryTitle">Intangible Cultural Heritage Directory</h2>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <select id="filter-country" class="bg-brand-800 border border-brand-700 text-sm rounded-lg px-3 py-2 text-gray-300 focus:outline-none focus:border-brand-accent transition-colors">
            <option value="all" data-i18n="filterAllCountries">All Countries</option>
          </select>
          <select id="filter-status" class="bg-brand-800 border border-brand-700 text-sm rounded-lg px-3 py-2 text-gray-300 focus:outline-none focus:border-brand-accent transition-colors">
            <option value="all" data-i18n="filterAll">All Status</option>
            <option value="COMPLETE" data-i18n="filterComplete">Complete Data</option>
            <option value="INCOMPLETE" data-i18n="filterIncomplete">Incomplete Data</option>
            <option value="SHARED" data-i18n="filterShared">Shared Heritage Only</option>
          </select>
          <select id="sort-order" class="bg-brand-800 border border-brand-700 text-sm rounded-lg px-3 py-2 text-gray-300 focus:outline-none focus:border-brand-accent transition-colors">
            <option value="newest" data-i18n="sortNewest">Newest First</option>
            <option value="oldest" data-i18n="sortOldest">Oldest First</option>
          </select>
        </div>
      </div>
      <div id="inventory-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="load-more-container" class="w-full flex justify-center mt-6 hidden">
      <button id="btn-load-more" onclick="loadMoreItems()" class="bg-brand-800 border border-brand-700 hover:border-brand-accent px-6 py-2 rounded-full text-sm font-bold transition-all text-brand-accent">
        Load More
      </button>
    </div>
  </main>

  <!-- Modal -->
  <div id="item-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden modal-blur bg-black/60 p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-brand-800 border border-brand-700 rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="modal-content-wrapper">
      <div class="flex justify-between items-center p-6 border-b border-brand-700">

        <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors bg-brand-700 p-2 rounded-full">

        </button>
      </div>
      <div class="p-6 overflow-y-auto flex-grow flex flex-col gap-6" id="modal-body"></div>
    </div>
  </div>

  // Helper: resolve coords from a country string (falls back to [0,0])
  function coordsForCountry(countryStr) {
    if (!countryStr) return null;
    // Direct match
    if (COUNTRY_CENTROIDS[countryStr]) return COUNTRY_CENTROIDS[countryStr];
    // Partial match (e.g. "India, Syria, Lebanon" → first token)
    const first = countryStr.split(',')[0].trim();
    return COUNTRY_CENTROIDS[first] || null;
  }

        "resume_analisa":{"description":"Asymmetrical dagger with distinctive blade-patterning.","cultural_significance":"A symbol of status, spiritual artifact, and heirloom.","gemini_tags":["weapon","spiritual","metalwork"]},

        "shared_heritage_detection":{"is_shared":true,"confidence_score":0.95,"related_elements":[{"country":"Malaysia","element_name":"Keris Melayu","relationship_reason":"Austronesian historical roots"},{"country":"Brunei Darussalam","element_name":"Keris Brunei","relationship_reason":"Spread of royal court culture"}]},
        "completion_status":"COMPLETE"
      },
      {
        "id":"ich-002","element_name":"Tejate","category":"Culinary Traditions",
        "thumbnail_url":"https://upload.wikimedia.org/wikipedia/commons/1/1a/Tejate_en_j%C3%ADcara.jpg",
        "source_urls":["https://en.wikipedia.org/wiki/Tejate"],
        "scraped_at": new Date().toISOString(),
        "location":{"country":"Mexico","provinces":["Oaxaca"],"lat":17.0732,"lng":-96.7266},
        "resume_analisa":{"description":"A traditional non-alcoholic maize and cacao beverage.","cultural_significance":"Drink of the gods.","gemini_tags":["beverage","cacao","indigenous"]},
        "resume_tata_cara":null,
        "shared_heritage_detection":{"is_shared":false,"confidence_score":0,"related_elements":[]},
        "completion_status":"INCOMPLETE"
      }
    ]
  };

  // ═══════════════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════════════
  let globalData    = null;
  let filteredData  = [];
  let map           = null;
  let linesLayer    = null;   // polylines live on a plain layer (animates properly)
  let markersLayer  = null;   // cluster group for markers
  let currentPage   = 1;
  const itemsPerPage = 9;

  // ═══════════════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════════════
  async function init() {
    try {
      const response = await fetch('data.json');
      if (!response.ok) throw new Error('Network response was not ok');
      globalData = await response.json();
    } catch (error) {
      console.warn('Failed to load data.json, using mock data.', error);
      globalData = MOCK_DATA;
    }
    populateCountryFilter();
    updateLangUI();
    renderDashboard();
    updateScraperTicker();
    initMap();
    setupEventListeners();
    applyFilters();
  }

  function populateCountryFilter() {
    const sel = document.getElementById('filter-country');
    const countries = new Set();
    globalData.inventory.forEach(item => {
      if (item.location?.country) countries.add(item.location.country);
    });
    Array.from(countries).sort().forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.innerText = c;
      sel.appendChild(o);
    });
  }

  // ═══════════════════════════════════════════════════════════════
  //  UI RENDERING
  // ═══════════════════════════════════════════════════════════════
  function renderDashboard() {
    const { summary } = globalData;
    const dict = i18n[currentLang];
    const dateStr = new Date(summary.generated_at)
      .toLocaleString(currentLang === 'en' ? 'en-US' : 'id-ID', { dateStyle:'medium', timeStyle:'short' });
    document.getElementById('last-updated').innerHTML =
      `<i class="ph ph-clock text-brand-secondary"></i> <span>${dict.lastUpdate} ${dateStr}</span>`;
    const sharedCount = globalData.inventory.filter(i => i.shared_heritage_detection?.is_shared).length;
    document.getElementById('stats-container').innerHTML = `
      <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
        <p class="text-gray-400 text-sm font-medium">${dict.totalElements}</p>
        <p class="text-3xl font-display font-bold text-white">${summary.total_ich_elements}</p>
      </div>
      <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
        <p class="text-gray-400 text-sm font-medium">${dict.completeData}</p>
        <p class="text-3xl font-display font-bold text-brand-accent">${summary.complete_records}</p>
      </div>
      <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
        <p class="text-gray-400 text-sm font-medium">${dict.needsEnrichment}</p>
        <p class="text-3xl font-display font-bold text-red-400">${summary.incomplete_records}</p>
      </div>
      <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
        <p class="text-gray-400 text-sm font-medium">${dict.sharedNetwork}</p>
        <p class="text-3xl font-display font-bold text-brand-secondary">${sharedCount}</p>
      </div>`;
  }

  function updateScraperTicker() {
    const dict = i18n[currentLang];
    const sorted = [...globalData.inventory].sort((a,b) => new Date(b.scraped_at) - new Date(a.scraped_at));
    const latest = sorted[0];
    const isComplete = latest?.completion_status === 'COMPLETE';
    document.getElementById('system-ticker').innerHTML = `
      <span class="text-white">${isComplete ? dict.enrichedLog : dict.discoveredLog}:</span>
      <span class="text-brand-accent font-bold px-1">${latest?.element_name}</span>
      <span class="text-gray-400">(${latest?.location?.country || 'Unknown'})</span>
      <span class="${isComplete ? 'text-brand-accent' : 'text-red-400'} text-[10px] border border-current px-1 rounded ml-1">${latest?.completion_status}</span>`;
  }

  function renderGrid(data, append = false) {
    const grid = document.getElementById('inventory-grid');
    const loadMoreContainer = document.getElementById('load-more-container');
    const dict = i18n[currentLang];
    if (!append) grid.innerHTML = '';
    if (data.length === 0) {
      grid.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">${dict.emptyGrid}</div>`;
      if (loadMoreContainer) loadMoreContainer.classList.add('hidden');
      return;
    }
    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex   = startIndex + itemsPerPage;
    data.slice(startIndex, endIndex).forEach(item => {
      const isComplete = item.completion_status === 'COMPLETE';
      const isShared   = item.shared_heritage_detection?.is_shared;
      const tags       = item.resume_analisa?.gemini_tags?.slice(0,3) || [];
      const tagsHtml   = tags.map(t => `<span class="bg-brand-700 text-xs px-2 py-1 rounded-md text-gray-300">#${t}</span>`).join('');
      const card = document.createElement('div');
      card.className = "bg-brand-800 border border-brand-700 rounded-xl overflow-hidden hover:border-brand-500 transition-colors group flex flex-col";
      const safeImg = getValidImageUrl(item.thumbnail_url);
      card.innerHTML = `
        <div class="h-48 w-full bg-brand-900 relative overflow-hidden">
          <img src="${safeImg}" alt="${item.element_name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-80 group-hover:opacity-100" onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}'">
          <div class="absolute top-3 right-3 flex gap-2">
            ${isShared ? '<span class="bg-brand-secondary text-brand-900 text-[10px] font-bold px-2 py-1 rounded shadow"><i class="ph-fill ph-link"></i> SHARED</span>' : ''}
            <span class="${isComplete ? 'bg-brand-accent text-brand-900' : 'bg-red-500 text-white'} text-[10px] font-bold px-2 py-1 rounded shadow">${isComplete ? 'COMPLETE' : 'INCOMPLETE'}</span>
          </div>
        </div>
        <div class="p-5 flex flex-col flex-grow gap-3">
          <div>
            <p class="text-xs text-brand-secondary font-mono mb-1 tracking-widest uppercase">${item.category}</p>
            <h3 class="font-display font-bold text-xl leading-tight line-clamp-2">${item.element_name}</h3>
            <p class="text-sm text-gray-400 mt-1"><i class="ph-fill ph-map-pin mr-1"></i>${item.location?.country || 'Unknown'}</p>
          </div>
          <p class="text-sm text-gray-300 line-clamp-3 leading-relaxed flex-grow">${item.resume_analisa?.description || '...'}</p>
          <div class="flex flex-wrap gap-1 mt-auto pt-4 border-t border-brand-700">${tagsHtml}</div>
          <button onclick='openModal("${item.id}")' class="w-full mt-3 bg-brand-700 hover:bg-brand-accent hover:text-brand-900 text-white py-2.5 rounded-lg text-sm font-bold transition-all duration-300">${dict.btnAnalyze}</button>
        </div>`;
      grid.appendChild(card);
    });
    if (loadMoreContainer) {
      endIndex < data.length ? loadMoreContainer.classList.remove('hidden') : loadMoreContainer.classList.add('hidden');
    }
  }

  function loadMoreItems() {
    currentPage++;
    renderGrid(filteredData, true);
  }

  // ═══════════════════════════════════════════════════════════════
  //  MAP
  // ═══════════════════════════════════════════════════════════════
  function initMap() {
    map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd', maxZoom: 20
    }).addTo(map);
    setTimeout(() => map.invalidateSize(), 500);
  }

  const mainIcon = L.divIcon({
    className: '', html: '<div class="marker-main"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10]
  });
  const relatedIcon = L.divIcon({
    className: '', html: '<div class="marker-related"></div>',
    iconSize: [10, 10], iconAnchor: [5, 5], popupAnchor: [0, -8]
  });

  function drawMapElements(data) {
    if (!map) return;

    // ── Clear previous layers ──
    if (linesLayer)   { map.removeLayer(linesLayer);   linesLayer = null; }
    if (markersLayer) { map.removeLayer(markersLayer); markersLayer = null; }

    // Polylines must NOT be inside MarkerClusterGroup (clustering breaks SVG animation)
    linesLayer   = L.layerGroup().addTo(map);
    markersLayer = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 40 });
    map.addLayer(markersLayer);

    // Track which related-country markers were already drawn
    const drawnRelated = new Set();

    data.forEach(item => {
      const lat = item.location?.lat;
      const lng = item.location?.lng;
      if (!lat || !lng) return;

      const mainCoords = [lat, lng];

      // ── Main marker ──
      L.marker(mainCoords, { icon: mainIcon })
        .bindPopup(`<strong>${item.element_name}</strong><br><span style="color:#aaa">${item.location.country}</span>`)
        .addTo(markersLayer);

      // ── Shared heritage connections ──
      if (item.shared_heritage_detection?.is_shared) {
        item.shared_heritage_detection.related_elements.forEach(rel => {
          const relCoords = coordsForCountry(rel.country);
          if (!relCoords) return;

          // Related-country marker (draw once per country)
          const relKey = rel.country + '||' + rel.element_name;
          if (!drawnRelated.has(relKey)) {
            drawnRelated.add(relKey);
            L.marker(relCoords, { icon: relatedIcon })
              .bindPopup(`<strong>${rel.element_name}</strong><br><span style="color:#aaa">${rel.country}</span><br><em style="color:#ccc;font-size:11px">${rel.relationship_reason}</em>`)
              .addTo(markersLayer);
          }

          // Animated glowing connection line
          L.polyline([mainCoords, relCoords], {
            className : 'glowing-line',
            weight    : 1.8,
            opacity   : 0.85
          }).addTo(linesLayer);
        });
      }
    });
  }

  // ═══════════════════════════════════════════════════════════════
  //  FILTERS & SORT
  // ═══════════════════════════════════════════════════════════════
  function applyFilters() {
    const statusVal  = document.getElementById('filter-status').value;
    const countryVal = document.getElementById('filter-country').value;
    const sortVal    = document.getElementById('sort-order').value;
    let result = [...globalData.inventory];
    if (statusVal === 'COMPLETE')    result = result.filter(i => i.completion_status === 'COMPLETE');
    else if (statusVal === 'INCOMPLETE') result = result.filter(i => i.completion_status !== 'COMPLETE');
    else if (statusVal === 'SHARED') result = result.filter(i => i.shared_heritage_detection?.is_shared);
    if (countryVal !== 'all') result = result.filter(i => i.location?.country === countryVal);
    result.sort((a,b) => {
      const dA = new Date(a.scraped_at||0), dB = new Date(b.scraped_at||0);
      return sortVal === 'newest' ? dB - dA : dA - dB;
    });
    filteredData = result;
    currentPage = 1;
    renderGrid(filteredData, false);
    drawMapElements(filteredData);
  }

  function setupEventListeners() {
    document.getElementById('filter-status').addEventListener('change', applyFilters);
    document.getElementById('filter-country').addEventListener('change', applyFilters);
    document.getElementById('sort-order').addEventListener('change', applyFilters);
  }

  // ═══════════════════════════════════════════════════════════════
  //  MODAL
  // ═══════════════════════════════════════════════════════════════
  function formatSourceLinks(urls, dict) {
    if (!urls || urls.length === 0) return '-';
    return urls.map((url, i) => {
      const isVertex = url.includes('vertexaisearch') || url.includes('grounding-api-redirect');
      let label = isVertex ? `${dict.googleSource} ${i+1}` : (() => { try { return new URL(url).hostname.replace(/^www\./,''); } catch(e) { return `Link ${i+1}`; } })();
      let icon  = isVertex ? 'ph-google-logo' : 'ph-link';
      let cls   = isVertex ? 'text-brand-accent border-brand-accent/30' : 'text-blue-400 border-brand-700';
      return `<a href="${url}" target="_blank" class="w-fit flex items-center gap-2 px-3 py-2 rounded-md bg-brand-900 border ${cls} text-xs font-mono truncate max-w-full hover:opacity-80 transition" title="${url}"><i class="ph ${icon} text-lg shrink-0"></i><span class="truncate">${label}</span></a>`;
    }).join('');
  }

  function openModal(itemId) {
    const item = globalData.inventory.find(i => i.id === itemId);
    if (!item) return;
    const dict = i18n[currentLang];
    document.getElementById('modal-title').innerText = item.element_name;

    let toolsHtml = '', stepsHtml = '';
    if (item.resume_tata_cara?.step_by_step) {
      if (item.resume_tata_cara.materials_and_tools) {
        toolsHtml = `<div class="mb-4">
          <h5 class="text-brand-secondary font-bold text-sm mb-2"><i class="ph-fill ph-toolbox mr-2"></i>${dict.modalTools}</h5>
          <div class="flex flex-wrap gap-2">${item.resume_tata_cara.materials_and_tools.map(m=>`<span class="bg-brand-700 px-3 py-1 rounded text-sm">${m}</span>`).join('')}</div>
        </div>`;
      }
      stepsHtml = `<div>
        <h5 class="text-brand-secondary font-bold text-sm mb-2"><i class="ph-fill ph-list-numbers mr-2"></i>${dict.modalSteps} (${item.resume_tata_cara.type||'Process'})</h5>
        <div class="space-y-3">${item.resume_tata_cara.step_by_step.map(s=>`<div class="bg-brand-900/50 p-3 rounded-lg border border-brand-700 text-sm text-gray-300 leading-relaxed">${s.replace(/\*\*/g,'')}</div>`).join('')}</div>
      </div>`;
    } else {
      stepsHtml = `<div class="p-4 bg-brand-900/50 rounded-lg border border-brand-700 text-red-400 text-sm text-center"><i class="ph ph-warning-circle mr-1"></i>${dict.modalIncomplete}</div>`;
    }

    let sharedHtml = '';
    if (item.shared_heritage_detection?.is_shared) {
      sharedHtml = `<div class="bg-brand-900/80 p-5 rounded-xl border border-brand-secondary/30 mt-4">
        <h4 class="font-bold text-brand-secondary flex items-center gap-2 mb-4"><i class="ph-fill ph-share-network"></i>${dict.modalShared} (Confidence: ${(item.shared_heritage_detection.confidence_score*100).toFixed(0)}%)</h4>
        <div class="space-y-4">${item.shared_heritage_detection.related_elements.map(r=>`
          <div class="pl-4 border-l-2 border-brand-secondary/50">
            <p class="font-bold text-white">${r.element_name} <span class="text-gray-500 font-normal">(${r.country})</span></p>
            <p class="text-sm text-gray-400 mt-1">"${r.relationship_reason}"</p>
          </div>`).join('')}</div>
      </div>`;
    }

    const safeImg = getValidImageUrl(item.thumbnail_url);
    document.getElementById('modal-body').innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-4">
          <img src="${safeImg}" class="w-full rounded-xl border border-brand-700 object-cover aspect-video shadow-lg" onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}'">
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-brand-900 p-3 rounded-lg border border-brand-700">
              <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">${dict.modalOrigin}</p>
              <p class="font-bold text-sm">${item.location?.country||'-'}</p>
              <p class="text-xs text-gray-400 mt-1">${(item.location?.provinces||[]).join(', ')}</p>
            </div>
            <div class="bg-brand-900 p-3 rounded-lg border border-brand-700">
              <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">${dict.modalCategory}</p>
              <p class="font-bold text-sm leading-tight">${item.category}</p>
            </div>
          </div>
          <div class="bg-brand-900 p-4 rounded-lg border border-brand-700">
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">${dict.modalSignificance}</p>
            <p class="text-sm text-brand-accent leading-relaxed">${item.resume_analisa?.cultural_significance||'-'}</p>
          </div>
          <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">${dict.modalSources}</p>
            <div class="flex flex-col gap-2">${formatSourceLinks(item.source_urls, dict)}</div>
          </div>
        </div>
        <div class="flex flex-col">
          <h4 class="font-display font-bold text-lg mb-2">${dict.modalDesc}</h4>
          <p class="text-sm text-gray-300 leading-relaxed mb-6">${item.resume_analisa?.description||'-'}</p>
          ${toolsHtml}${stepsHtml}${sharedHtml}
        </div>
      </div>`;

    const modal   = document.getElementById('item-modal');
    const wrapper = document.getElementById('modal-content-wrapper');
    modal.classList.remove('hidden');
    void modal.offsetWidth;
    modal.classList.remove('opacity-0');
    wrapper.classList.remove('scale-95');
  }

  function closeModal() {
    const modal   = document.getElementById('item-modal');
    const wrapper = document.getElementById('modal-content-wrapper');
    modal.classList.add('opacity-0');
    wrapper.classList.add('scale-95');
    setTimeout(() => modal.classList.add('hidden'), 300);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !document.getElementById('item-modal').classList.contains('hidden')) closeModal();
  });
  document.getElementById('item-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('item-modal')) closeModal();
  });

  // ═══════════════════════════════════════════════════════════════
  //  i18n TOGGLE
  // ═══════════════════════════════════════════════════════════════
  function toggleLang() {
    currentLang = currentLang === 'en' ? 'id' : 'en';
    document.getElementById('lang-label').innerText = currentLang.toUpperCase();
    document.documentElement.lang = currentLang;
    updateLangUI(); renderDashboard(); updateScraperTicker(); applyFilters(); closeModal();
  }
  function updateLangUI() {
    const dict = i18n[currentLang];
    document.getElementById('app-title').innerHTML = dict.title;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key]) el.tagName === 'OPTION' ? (el.innerText = dict[key]) : (el.innerHTML = dict[key]);
    });
  }

  window.onload = init;
  </script>
</body>
