<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICH Shared Heritage Radar</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <!-- Tailwind CSS & Leaflet -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            brand: {
              900: '#0a0a0a',
              800: '#141414',
              700: '#1f1f1f',
              accent: '#00ffcc', // Glowing cyan
              secondary: '#facc15' // Gold for heritage
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0a0a0a; color: #f5f5f5; }
    
    /* Glowing Map Lines Animation */
    .glowing-line {
      stroke: #00ffcc;
      filter: drop-shadow(0 0 3px #00ffcc) drop-shadow(0 0 8px #00ffcc);
      stroke-dasharray: 8 8;
      animation: dashMove 2s linear infinite;
    }
    
    @keyframes dashMove {
      to { stroke-dashoffset: -16; }
    }

    /* Modal Backdrop Blur */
    .modal-blur {
      backdrop-filter: blur(8px);
    }
    
    /* Custom Scrollbar for dark theme */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #141414; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-brand-700 bg-brand-900/80 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <i class="ph-fill ph-globe-hemisphere-east text-3xl text-brand-accent animate-pulse"></i>
        <h1 class="font-display font-bold text-xl tracking-tight" id="app-title">ICH <span class="text-brand-accent">Shared Heritage</span> Radar</h1>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="text-xs text-gray-400 font-mono flex items-center gap-1" id="last-updated">
          <i class="ph ph-clock"></i> <span data-i18n="loading">Loading data...</span>
        </div>
        
        <!-- Language Toggle -->
        <button onclick="toggleLang()" class="bg-brand-800 border border-brand-700 hover:border-brand-500 px-3 py-1.5 rounded-md text-xs font-bold transition-colors flex items-center gap-2">
          <i class="ph ph-translate text-brand-secondary"></i>
          <span id="lang-label">EN</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col gap-8">
    
    <!-- Scraper History Status (Terminal Ticker) -->
    <div class="bg-brand-900 border border-brand-700 rounded-lg p-3 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 text-xs font-mono text-gray-400 shadow-inner">
      <div class="flex items-center gap-2 text-brand-accent whitespace-nowrap">
        <span class="w-2 h-2 rounded-full bg-brand-accent animate-pulse"></span>
        <span data-i18n="sysStatus">System Status</span>: ONLINE
      </div>
      <div class="hidden sm:block border-l border-brand-700 h-4"></div>
      <div class="truncate flex-grow flex items-center gap-2">
        <span class="text-brand-secondary font-bold" data-i18n="sysLastAction">Latest Discovery:</span>
        <span id="system-ticker" class="text-gray-300 italic"><span data-i18n="sysStandby">Monitoring global sources...</span></span>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="stats-container">
      <!-- Injected via JS -->
    </div>

    <!-- Map Section -->
    <div class="flex flex-col gap-2">
      <div class="flex items-center gap-2">
        <i class="ph ph-map-trifold text-xl text-brand-secondary"></i>
        <h2 class="font-display font-bold text-lg" data-i18n="mapTitle">Heritage Network Map</h2>
      </div>
      <div id="map" class="w-full h-[400px] rounded-xl border border-brand-700 bg-brand-800 z-10"></div>
    </div>

    <!-- Inventory Grid Section -->
    <div class="flex flex-col gap-4">
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <i class="ph ph-books text-xl text-brand-secondary"></i>
          <h2 class="font-display font-bold text-lg" data-i18n="directoryTitle">Intangible Cultural Heritage Directory</h2>
        </div>
        
        <!-- Filter Toggle -->
        <select id="filter-status" class="bg-brand-800 border border-brand-700 text-sm rounded-lg px-3 py-2 text-gray-300 focus:outline-none focus:border-brand-accent transition-colors">
          <option value="all" data-i18n="filterAll">All Status</option>
          <option value="COMPLETE" data-i18n="filterComplete">Complete Data</option>
          <option value="INCOMPLETE" data-i18n="filterIncomplete">Incomplete Data</option>
          <option value="SHARED" data-i18n="filterShared">Shared Heritage Only</option>
        </select>
      </div>

      <div id="inventory-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Injected via JS -->
      </div>
    </div>
  </main>

  <!-- Modal Component (Hidden by default) -->
  <div id="item-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden modal-blur bg-black/60 p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-brand-800 border border-brand-700 rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="modal-content-wrapper">
      
      <!-- Modal Header -->
      <div class="flex justify-between items-center p-6 border-b border-brand-700">
        <h3 class="font-display font-bold text-2xl" id="modal-title">Element Name</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors bg-brand-700 p-2 rounded-full">
          <i class="ph ph-x text-xl"></i>
        </button>
      </div>

      <!-- Modal Body (Scrollable) -->
      <div class="p-6 overflow-y-auto flex-grow flex flex-col gap-6" id="modal-body">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // --- DICTIONARY FOR i18n ---
    const i18n = {
      en: {
        title: "ICH <span class='text-brand-accent'>Shared Heritage</span> Radar",
        loading: "Loading data...",
        lastUpdate: "Last updated:",
        totalElements: "Total Elements",
        completeData: "Complete Data",
        needsEnrichment: "Needs Enrichment",
        sharedNetwork: "Shared Heritage Network",
        mapTitle: "Heritage Network Map",
        directoryTitle: "Intangible Cultural Heritage Directory",
        filterAll: "All Status",
        filterComplete: "Complete Data",
        filterIncomplete: "Incomplete Data",
        filterShared: "Shared Heritage Only",
        emptyGrid: "No elements match the filter.",
        btnAnalyze: "View Full Analysis",
        modalOrigin: "Origin Country",
        modalCategory: "Category",
        modalSignificance: "Cultural Significance",
        modalSources: "Data Sources",
        modalDesc: "Description",
        modalTools: "Tools & Materials",
        modalSteps: "Process / Steps",
        modalIncomplete: "Specific steps not found. Status: INCOMPLETE.",
        modalShared: "Shared Heritage Detected",
        sysStatus: "System Status",
        sysLastAction: "Latest Discovery:",
        sysStandby: "Monitoring global sources...",
        discoveredLog: "Scraped new item",
        enrichedLog: "Enriched item data",
        googleSource: "Google Grounded Source"
      },
      id: {
        title: "Radar <span class='text-brand-accent'>Warisan Budaya</span> ICH",
        loading: "Memuat data...",
        lastUpdate: "Pembaruan terakhir:",
        totalElements: "Total Elemen",
        completeData: "Data Komplit",
        needsEnrichment: "Butuh Pengayaan",
        sharedNetwork: "Jaringan Shared Heritage",
        mapTitle: "Peta Jaringan Warisan Budaya",
        directoryTitle: "Direktori Warisan Budaya Takbenda",
        filterAll: "Semua Status",
        filterComplete: "Data Komplit",
        filterIncomplete: "Data Tidak Komplit",
        filterShared: "Hanya Shared Heritage",
        emptyGrid: "Tidak ada elemen yang sesuai filter.",
        btnAnalyze: "Lihat Analisa Lengkap",
        modalOrigin: "Negara Asal",
        modalCategory: "Kategori",
        modalSignificance: "Signifikansi Budaya",
        modalSources: "Sumber Data",
        modalDesc: "Deskripsi",
        modalTools: "Alat & Bahan",
        modalSteps: "Tata Cara / Urutan",
        modalIncomplete: "Tata cara spesifik belum ditemukan. Status: INCOMPLETE.",
        modalShared: "Shared Heritage Terdeteksi",
        sysStatus: "Status Sistem",
        sysLastAction: "Penemuan Terbaru:",
        sysStandby: "Memantau sumber global...",
        discoveredLog: "Menemukan elemen baru",
        enrichedLog: "Mengumpulkan data tambahan",
        googleSource: "Sumber Referensi Google"
      }
    };

    let currentLang = 'en';

    // --- MOCK DATA (Fallback jika data.json gagal dimuat) ---
    const MOCK_DATA = {
      "summary": {
        "generated_at": new Date().toISOString(),
        "total_ich_elements": 2,
        "complete_records": 1,
        "incomplete_records": 1,
        "categories_breakdown": {
          "Traditional Craftsmanship": 1,
          "Culinary Traditions": 1
        }
      },
      "inventory": [
        {
          "id": "ich-001",
          "element_name": "Keris Indonesia",
          "category": "Traditional Craftsmanship",
          "thumbnail_url": "https://images.unsplash.com/photo-1621252179022-d278ec68e7b3?w=800&q=80",
          "source_urls": [
            "https://vertexaisearch.cloud.google.com/grounding-api-redirect/AUZIYQG0mDIJi2PalHihByIDuWU6aiUdS91LgsVwaApUWA78wNqhycgswYv8aR7C1eoYjydOkyhjq4-s1KPgur2xOiQly-fM5o-BMu9EQ91CUz1xjgBuHd6NGvoH6Ew0xWGk7RWYUdf2N6oJYCiDQ6wXSaeIyp-q5E7WEbTEcRCi9CLa1e1n7aT72cHFuy8QJ-4eDbDQhoxkFnWaA==",
            "https://en.wikipedia.org/wiki/Kris"
          ],
          "scraped_at": new Date(Date.now() - 86400000).toISOString(),
          "location": { "country": "Indonesia", "provinces": ["Jawa", "Bali"] },
          "resume_analisa": {
            "description": "Asymmetrical dagger with distinctive blade-patterning achieved through alternating laminations of iron and nickelous meteoritic iron.",
            "cultural_significance": "A symbol of status, spiritual artifact, and heirloom passed down through generations.",
            "gemini_tags": ["weapon", "spiritual", "metalwork"]
          },
          "resume_tata_cara": {
            "type": "crafting_process",
            "materials_and_tools": ["Iron", "Steel", "Meteorite stone", "Forge"],
            "step_by_step": ["1. Ritual preparation", "2. Forging iron and pamor", "3. Shaping the blade", "4. Warangan (acid wash)"]
          },
          "shared_heritage_detection": {
            "is_shared": true,
            "confidence_score": 0.95,
            "related_elements": [
              { "country": "Malaysia", "element_name": "Keris Melayu", "relationship_reason": "Austronesian historical roots" },
              { "country": "Brunei Darussalam", "element_name": "Keris Brunei", "relationship_reason": "Spread of royal court culture" }
            ]
          },
          "completion_status": "COMPLETE"
        },
        {
          "id": "ich-002",
          "element_name": "Nasi Goreng",
          "category": "Culinary Traditions",
          "thumbnail_url": "https://images.unsplash.com/photo-1512058564366-18510be2db19?w=800&q=80",
          "source_urls": ["https://example.com"],
          "scraped_at": new Date().toISOString(),
          "location": { "country": "Indonesia", "provinces": ["National"] },
          "resume_analisa": {
            "description": "Indonesian meat and vegetable fried rice flavored with sweet soy sauce.",
            "cultural_significance": "Traditional zero-waste practice using leftover rice.",
            "gemini_tags": ["comfort food", "fried rice"]
          },
          "resume_tata_cara": null,
          "shared_heritage_detection": {
            "is_shared": true,
            "confidence_score": 0.88,
            "related_elements": [
              { "country": "Singapore", "element_name": "Nasi Goreng", "relationship_reason": "Culinary influence in hawker culture" }
            ]
          },
          "completion_status": "INCOMPLETE"
        }
      ]
    };

    // --- GEOCODING DICTIONARY ---
    const GEO_DICT = {
      "indonesia": [-0.7893, 113.9213],
      "malaysia": [4.2105, 101.9758],
      "singapore": [1.3521, 103.8198],
      "brunei darussalam": [4.5353, 114.7277],
      "thailand": [15.8700, 100.9925],
      "jepang": [36.2048, 138.2529],
      "japan": [36.2048, 138.2529],
      "korea": [35.9078, 127.7669],
      "china": [35.8617, 104.1954],
      "india": [20.5937, 78.9629],
      "vietnam": [14.0583, 108.2772],
      "philippines": [12.8797, 121.7740],
      "spain": [40.4637, -3.7492],
      "france": [46.2276, 2.2137],
      "mexico": [23.6345, -102.5528]
    };

    let globalData = null;
    let filteredData = [];
    let map = null;
    let markersLayer = null;

    // --- INITIALIZATION ---
    async function init() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Network response was not ok');
        globalData = await response.json();
      } catch (error) {
        console.warn('Failed to load data.json, using mock data.', error);
        globalData = MOCK_DATA;
      }

      filteredData = globalData.inventory;
      
      updateLangUI();
      renderDashboard();
      updateScraperTicker();
      initMap();
      setupEventListeners();
    }

    // --- SMART URL FORMATTER ---
    function formatSourceLinks(urls, dict) {
      if (!urls || urls.length === 0) return '-';
      
      return urls.map((url, index) => {
        const isVertexRedirect = url.includes('vertexaisearch.cloud.google.com') || url.includes('grounding-api-redirect');
        
        let displayText = '';
        let iconClass = '';
        let colorClass = '';
        let bgClass = 'bg-brand-900';

        if (isVertexRedirect) {
          displayText = `${dict.googleSource} ${index + 1}`;
          iconClass = 'ph-google-logo';
          colorClass = 'text-brand-accent hover:text-white';
          bgClass = 'bg-brand-900 border border-brand-accent/30';
        } else {
          try {
            // Extract the domain name for direct URLs
            displayText = new URL(url).hostname.replace(/^www\./, '');
          } catch(e) {
            displayText = `Link ${index + 1}`;
          }
          iconClass = 'ph-link';
          colorClass = 'text-blue-400 hover:text-blue-300';
          bgClass = 'bg-brand-800 border border-brand-700';
        }
        
        return `<a href="${url}" target="_blank" class="w-fit max-w-full flex items-center gap-2 px-3 py-2 rounded-md transition-colors ${bgClass} ${colorClass}" title="${url}">
                  <i class="ph ${iconClass} text-lg shrink-0"></i> 
                  <span class="text-xs font-mono truncate">${displayText}</span>
                </a>`;
      }).join('');
    }

    // --- i18n TRANSLATION LOGIC ---
    function toggleLang() {
      currentLang = currentLang === 'en' ? 'id' : 'en';
      document.getElementById('lang-label').innerText = currentLang.toUpperCase();
      document.documentElement.lang = currentLang;
      
      updateLangUI();
      renderDashboard();
      updateScraperTicker();
      
      // Close modal to reset translation state
      closeModal();
    }

    function updateLangUI() {
      const dict = i18n[currentLang];
      document.getElementById('app-title').innerHTML = dict.title;
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) {
          if (el.tagName === 'OPTION') {
            el.innerText = dict[key];
          } else {
            el.innerHTML = dict[key];
          }
        }
      });
    }

    // --- RENDER LOGIC ---
    function renderDashboard() {
      const { summary } = globalData;
      const dict = i18n[currentLang];

      const dateObj = new Date(summary.generated_at);
      const dateStr = dateObj.toLocaleString(currentLang === 'en' ? 'en-US' : 'id-ID', { dateStyle: 'medium', timeStyle: 'short' });
      document.getElementById('last-updated').innerHTML = `<i class="ph ph-clock text-brand-secondary"></i> <span>${dict.lastUpdate} ${dateStr}</span>`;

      const sharedCount = globalData.inventory.filter(i => i.shared_heritage_detection?.is_shared).length;
      document.getElementById('stats-container').innerHTML = `
        <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
          <p class="text-gray-400 text-sm font-medium">${dict.totalElements}</p>
          <p class="text-3xl font-display font-bold text-white">${summary.total_ich_elements}</p>
        </div>
        <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
          <p class="text-gray-400 text-sm font-medium">${dict.completeData}</p>
          <p class="text-3xl font-display font-bold text-brand-accent">${summary.complete_records}</p>
        </div>
        <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
          <p class="text-gray-400 text-sm font-medium">${dict.needsEnrichment}</p>
          <p class="text-3xl font-display font-bold text-red-400">${summary.incomplete_records}</p>
        </div>
        <div class="bg-brand-800 border border-brand-700 rounded-xl p-5 flex flex-col gap-1">
          <p class="text-gray-400 text-sm font-medium">${dict.sharedNetwork}</p>
          <p class="text-3xl font-display font-bold text-brand-secondary">${sharedCount}</p>
        </div>
      `;

      renderGrid(filteredData);
    }

    function updateScraperTicker() {
      const dict = i18n[currentLang];
      const inventory = globalData.inventory;
      
      if (inventory.length > 0) {
        // Sort by scraped_at to find latest
        const sorted = [...inventory].sort((a, b) => new Date(b.scraped_at) - new Date(a.scraped_at));
        const latest = sorted[0];
        const isComplete = latest.completion_status === 'COMPLETE';
        const actionText = isComplete ? dict.enrichedLog : dict.discoveredLog;
        
        document.getElementById('system-ticker').innerHTML = `
          <span class="text-white">${actionText}:</span> 
          <span class="text-brand-accent font-bold px-1">${latest.element_name}</span> 
          <span class="text-gray-400">(${latest.location?.country || 'Unknown'})</span> 
          <span class="${isComplete ? 'text-brand-accent' : 'text-red-400'} text-[10px] border border-current px-1 rounded ml-1">${latest.completion_status}</span>
        `;
      }
    }

    function renderGrid(data) {
      const grid = document.getElementById('inventory-grid');
      const dict = i18n[currentLang];
      grid.innerHTML = '';

      if (data.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">${dict.emptyGrid}</div>`;
        return;
      }

      data.forEach((item, index) => {
        const isComplete = item.completion_status === 'COMPLETE';
        const isShared = item.shared_heritage_detection?.is_shared;
        
        const tags = item.resume_analisa?.gemini_tags?.slice(0, 3) || [];
        const tagsHtml = tags.map(t => `<span class="bg-brand-700 text-xs px-2 py-1 rounded-md text-gray-300">#${t}</span>`).join('');

        const card = document.createElement('div');
        card.className = "bg-brand-800 border border-brand-700 rounded-xl overflow-hidden hover:border-brand-500 transition-colors group flex flex-col";
        card.innerHTML = `
          <div class="h-48 w-full bg-brand-900 relative overflow-hidden">
            <img src="${item.thumbnail_url || 'https://via.placeholder.com/400x300?text=No+Image'}" alt="${item.element_name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-80 group-hover:opacity-100" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Not+Found'">
            
            <div class="absolute top-3 right-3 flex gap-2">
              ${isShared ? '<span class="bg-brand-secondary text-brand-900 text-[10px] font-bold px-2 py-1 rounded shadow"><i class="ph-fill ph-link"></i> SHARED</span>' : ''}
              <span class="${isComplete ? 'bg-brand-accent text-brand-900' : 'bg-red-500 text-white'} text-[10px] font-bold px-2 py-1 rounded shadow">
                ${isComplete ? 'COMPLETE' : 'INCOMPLETE'}
              </span>
            </div>
          </div>
          
          <div class="p-5 flex flex-col flex-grow gap-3">
            <div>
              <p class="text-xs text-brand-secondary font-mono mb-1 tracking-widest uppercase">${item.category}</p>
              <h3 class="font-display font-bold text-xl leading-tight line-clamp-2">${item.element_name}</h3>
              <p class="text-sm text-gray-400 mt-1"><i class="ph-fill ph-map-pin mr-1"></i>${item.location?.country || 'Unknown'}</p>
            </div>
            
            <p class="text-sm text-gray-300 line-clamp-3 leading-relaxed flex-grow">
              ${item.resume_analisa?.description || '...'}
            </p>
            
            <div class="flex flex-wrap gap-1 mt-auto pt-4 border-t border-brand-700">
              ${tagsHtml}
            </div>
            
            <button onclick='openModal("${item.id}")' class="w-full mt-3 bg-brand-700 hover:bg-brand-accent hover:text-brand-900 text-white py-2.5 rounded-lg text-sm font-bold transition-all duration-300">
              ${dict.btnAnalyze}
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // --- MAP LOGIC ---
    function getCoords(countryName) {
      if (!countryName) return null;
      const key = countryName.toLowerCase().trim();
      return GEO_DICT[key] || [ (Math.random() * 40 - 20), (Math.random() * 100 + 40) ];
    }

    function initMap() {
      map = L.map('map').setView([10, 110], 3);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      drawMapElements(filteredData);
    }

    function drawMapElements(data) {
      if(markersLayer) map.removeLayer(markersLayer);
      markersLayer = L.layerGroup().addTo(map);

      const defaultIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="w-4 h-4 bg-brand-accent rounded-full shadow-[0_0_10px_#00ffcc]"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });

      const relatedIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="w-3 h-3 bg-brand-secondary rounded-full shadow-[0_0_8px_#facc15]"></div>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6]
      });

      data.forEach(item => {
        const mainCountry = item.location?.country;
        const mainCoords = getCoords(mainCountry);

        if (mainCoords) {
          L.marker(mainCoords, {icon: defaultIcon})
           .bindPopup(`<strong class="font-display text-brand-900">${item.element_name}</strong><br><span class="text-gray-600">${mainCountry}</span>`)
           .addTo(markersLayer);

          if (item.shared_heritage_detection?.is_shared && item.shared_heritage_detection.related_elements) {
            item.shared_heritage_detection.related_elements.forEach(rel => {
              const relCoords = getCoords(rel.country);
              if (relCoords) {
                L.marker(relCoords, {icon: relatedIcon})
                 .bindPopup(`<strong class="font-display text-brand-900">${rel.element_name}</strong><br><span class="text-gray-600">${rel.country} (Shared with ${mainCountry})</span>`)
                 .addTo(markersLayer);

                L.polyline([mainCoords, relCoords], {
                  className: 'glowing-line'
                }).addTo(markersLayer);
              }
            });
          }
        }
      });
    }

    // --- EVENT LISTENERS ---
    function setupEventListeners() {
      document.getElementById('filter-status').addEventListener('change', (e) => {
        const val = e.target.value;
        filteredData = globalData.inventory;
        
        if (val === 'COMPLETE') filteredData = filteredData.filter(i => i.completion_status === 'COMPLETE');
        else if (val === 'INCOMPLETE') filteredData = filteredData.filter(i => i.completion_status !== 'COMPLETE');
        else if (val === 'SHARED') filteredData = filteredData.filter(i => i.shared_heritage_detection?.is_shared);
        
        renderGrid(filteredData);
        drawMapElements(filteredData);
      });
    }

    // --- MODAL LOGIC ---
    function openModal(itemId) {
      const item = globalData.inventory.find(i => i.id === itemId);
      if(!item) return;

      const dict = i18n[currentLang];
      document.getElementById('modal-title').innerText = item.element_name;
      
      let toolsHtml = '';
      let stepsHtml = '';
      
      if (item.resume_tata_cara && item.resume_tata_cara.step_by_step) {
        if(item.resume_tata_cara.materials_and_tools) {
          toolsHtml = `
            <div class="mb-4">
              <h5 class="text-brand-secondary font-bold text-sm mb-2"><i class="ph-fill ph-toolbox mr-2"></i>${dict.modalTools}</h5>
              <div class="flex flex-wrap gap-2">
                ${item.resume_tata_cara.materials_and_tools.map(m => `<span class="bg-brand-700 px-3 py-1 rounded text-sm">${m}</span>`).join('')}
              </div>
            </div>`;
        }
        stepsHtml = `
          <div>
            <h5 class="text-brand-secondary font-bold text-sm mb-2"><i class="ph-fill ph-list-numbers mr-2"></i>${dict.modalSteps} (${item.resume_tata_cara.type || 'Process'})</h5>
            <div class="space-y-3">
              ${item.resume_tata_cara.step_by_step.map(s => `<div class="bg-brand-900/50 p-3 rounded-lg border border-brand-700 text-sm text-gray-300 leading-relaxed">${s.replace(/\*\*/g, '')}</div>`).join('')}
            </div>
          </div>`;
      } else {
        stepsHtml = `<div class="p-4 bg-brand-900/50 rounded-lg border border-brand-700 text-red-400 text-sm text-center"><i class="ph ph-warning-circle mr-1"></i> ${dict.modalIncomplete}</div>`;
      }

      let sharedHtml = '';
      if(item.shared_heritage_detection?.is_shared) {
        sharedHtml = `
          <div class="bg-brand-900/80 p-5 rounded-xl border border-brand-secondary/30 mt-4">
            <h4 class="font-bold text-brand-secondary flex items-center gap-2 mb-4"><i class="ph-fill ph-share-network"></i> ${dict.modalShared} (Confidence: ${(item.shared_heritage_detection.confidence_score*100).toFixed(0)}%)</h4>
            <div class="space-y-4">
              ${item.shared_heritage_detection.related_elements.map(r => `
                <div class="pl-4 border-l-2 border-brand-secondary/50">
                  <p class="font-bold text-white">${r.element_name} <span class="text-gray-500 font-normal">(${r.country})</span></p>
                  <p class="text-sm text-gray-400 mt-1">"${r.relationship_reason}"</p>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      document.getElementById('modal-body').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-4">
            <img src="${item.thumbnail_url || 'https://via.placeholder.com/600x400'}" class="w-full rounded-xl border border-brand-700 object-cover aspect-video shadow-lg">
            
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-brand-900 p-3 rounded-lg border border-brand-700">
                <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">${dict.modalOrigin}</p>
                <p class="font-bold text-sm">${item.location?.country || '-'}</p>
                <p class="text-xs text-gray-400 mt-1">${(item.location?.provinces || []).join(', ')}</p>
              </div>
              <div class="bg-brand-900 p-3 rounded-lg border border-brand-700">
                <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">${dict.modalCategory}</p>
                <p class="font-bold text-sm leading-tight">${item.category}</p>
              </div>
            </div>

            <div class="bg-brand-900 p-4 rounded-lg border border-brand-700">
              <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">${dict.modalSignificance}</p>
              <p class="text-sm text-brand-accent leading-relaxed">${item.resume_analisa?.cultural_significance || '-'}</p>
            </div>
            
            <div>
              <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">${dict.modalSources}</p>
              <div class="flex flex-col gap-2">
                ${formatSourceLinks(item.source_urls, dict)}
              </div>
            </div>
          </div>

          <div class="flex flex-col">
            <h4 class="font-display font-bold text-lg mb-2">${dict.modalDesc}</h4>
            <p class="text-sm text-gray-300 leading-relaxed mb-6">${item.resume_analisa?.description || '-'}</p>
            
            ${toolsHtml}
            ${stepsHtml}
            ${sharedHtml}
          </div>
        </div>
      `;

      const modal = document.getElementById('item-modal');
      const wrapper = document.getElementById('modal-content-wrapper');
      
      modal.classList.remove('hidden');
      void modal.offsetWidth;
      modal.classList.remove('opacity-0');
      wrapper.classList.remove('scale-95');
    }

    function closeModal() {
      const modal = document.getElementById('item-modal');
      const wrapper = document.getElementById('modal-content-wrapper');
      
      modal.classList.add('opacity-0');
      wrapper.classList.add('scale-95');
      
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.getElementById('item-modal').classList.contains('hidden')) {
        closeModal();
      }
    });

    document.getElementById('item-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('item-modal')) {
        closeModal();
      }
    });

    window.onload = init;
  </script>
</body>
</html>
