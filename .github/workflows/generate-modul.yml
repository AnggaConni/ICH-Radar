name: Generate Modul

on:
  push:
    paths:
      - 'data/pdf/**/*.pdf'   # Berjalan hanya jika ada file PDF yang di-push/diubah

# Baris di bawah ini adalah SOLUSI untuk error "403 Permission Denied"
permissions:
  contents: write

jobs:
  build-modul:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Jalankan Script Node.js Generator
        run: node scripts/generate-modul.js

      - name: Commit & Push Hasil HTML
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add modul/ modul.html data/pdf/
          git commit -m "Auto-generate HTML Modules from PDF" || echo "No changes to commit"
          git push
